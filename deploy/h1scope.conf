<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/h1scope/frontend

    <Directory /var/www/h1scope/frontend>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    ProxyPreserveHost On
    ProxyPass /api http://127.0.0.1:8765/api
    ProxyPassReverse /api http://127.0.0.1:8765/api

    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"

    ErrorLog ${APACHE_LOG_DIR}/h1scope_error.log
    CustomLog ${APACHE_LOG_DIR}/h1scope_access.log combined
</VirtualHost>
